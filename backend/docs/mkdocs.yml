site_name: VERDANT API Docs
site_description: Reference documentation for the Verdant Market backend APIs.
site_url: https://verdant.samthetechi.site/docs
repo_url: https://github.com/SamTheTechi/verdant
repo_name: SamTheTechi/Verdant
theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: slate
      primary: green
      accent: lime
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
extra_css:
  - assets/extra.css
markdown_extensions:
  - tables
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Overview: index.md
  - Authentication: auth.md
  - Products: products.md
  - Cart: cart.md
  - Checkout: checkout.md
  - Metrics: metrics.md
docs_dir: pages
site_dir: ../site
